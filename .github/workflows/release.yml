name: release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub release
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      # Tag pushes do not trigger the branch-filtered ci workflow, so the
      # release runs its own gate: the jsdom suite plus one real browser.
      - run: bun run test
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test --project=chromium
      # trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10
      - run: npm install -g npm@latest
      # prepublishOnly runs the test suite and builds dist + min;
      # provenance is attached automatically under trusted publishing
      - run: npm publish --access public
      # idempotent re-runs: only create the release if it does not exist yet
      - run: gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
